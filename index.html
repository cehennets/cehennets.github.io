<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>defne</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0d0d0f;
      color: #e8e8e8;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 50px 22px;
    }

    main {
      width: 100%;
      max-width: 620px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      font-weight: normal;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #777;
      margin-bottom: 42px;
    }

    h2 {
      margin-top: 38px;
      font-size: 15px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: normal;
    }

    .currently {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .status {
      padding: 14px 16px;
      border: 1px solid #29292e;
      background: #131316;
      border-radius: 8px;
    }

    nav {
      margin-top: 18px;
      display: grid;
      gap: 8px;
    }

    nav a {
      color: #e8e8e8;
      text-decoration: none;
      padding: 13px 16px;
      border-left: 2px solid #333;
      transition: 0.2s;
    }

    nav a::before {
      content: "> ";
      color: #777;
    }

    nav a:hover {
      background: #17171b;
      border-left-color: #e8e8e8;
      padding-left: 22px;
    }

    footer {
      margin-top: 50px;
      padding-top: 20px;
      border-top: 1px solid #242429;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <main>
    <h1>defne</h1>
    <div class="subtitle">personal archive / character menu</div>

    <h2>currently</h2>

    <section class="currently">
      <div class="status">🏹 archery</div>
      <div class="status">🏋️ cutting</div>
      <div class="status">🎬 watching</div>
      <div class="status">📚 reading</div>
    </section>

    <h2>menu</h2>

    <nav>
      <a href="#">journal</a>
      <a href="#">gym</a>
      <a href="#">skills</a>
      <a href="#">films</a>
      <a href="#">psychology</a>
      <a href="#">gallery</a>
      <a href="#">links</a>
    </nav>

    <footer>
      cehennets.github.io
    </footer>
  </main>
</body>
</html>
