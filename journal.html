<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>journal — defne</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #080808;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      padding: 35px 20px 70px;
    }

    main {
      width: min(760px, 100%);
      margin: auto;
    }

    h1 {
      margin: 0 0 35px;
      font-size: clamp(55px, 16vw, 105px);
      line-height: .9;
      color: #080808;
      -webkit-text-stroke: 2px white;
      text-transform: uppercase;
      transform: rotate(-2deg);
      text-shadow: 8px 8px #d50025;
    }

    .entry {
      margin-bottom: 24px;
      padding: 22px;
      background: white;
      color: black;
      border: 4px solid black;
      box-shadow: 8px 8px #d50025;
      transform: skew(-3deg);
    }

    .entry-content {
      transform: skew(3deg);
    }

    .date {
      display: inline-block;
      margin-bottom: 12px;
      padding: 5px 10px;
      background: #d50025;
      color: white;
      font-weight: 900;
    }

    .back {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 18px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 6px 6px #d50025;
    }
  </style>
</head>

<body>
  <main>
    <h1>journal</h1>

    <article class="entry">
      <div class="entry-content">
        <div class="date">24.07.2026</div>
        <p>siteyi kurmaya başladım</p>
      </div>
    </article>

    <article class="entry">
      <div class="entry-content">
        <div class="date">23.07.2026</div>
        <p>buraya istediğim şeyleri yazacağım</p>
      </div>
    </article>

    <a class="back" href="index.html">← ana menü</a>
  </main>
</body>
</html>
